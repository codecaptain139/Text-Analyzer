<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Text Analyzer</h1>

        <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>

        <div class="buttons">
            <button id="wordBtn">Word Count</button>
            <button id="charBtn">Character Count</button>
            <button id="vowelBtn">Vowel Count</button>
            <button id="reverseBtn">Reverse Text</button>
            <button id="consonantBtn">Consonant Count</button>
            <button id="longestWordBtn">Longest Word</button>
            <button id="clearBtn">Clear</button>
        </div>
        
        <div id="result">Result will appear here</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
